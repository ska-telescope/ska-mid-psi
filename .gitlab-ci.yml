image: $SKA_K8S_TOOLS_BUILD_DEPLOY

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  RUNNER_TAG: k8srunner-psi-mid
  MINIKUBE: false
  TANGO_HOST: databaseds-tango-base:10000
  CLUSTER_DOMAIN: cluster.local
  K8S_TIMEOUT: 800s
  DISH_LMC_ENABLED:
    value: "true"
    options:
      - "true"
      - "false"
    description: "Deploy DishLMC if true"
  PST_ENABLED:
    value: "false"
    options:
      - "true"
      - "false"
    description: "Deploy PST if true"
  FULL_AA1:
    value: "false"
    options:
      - "true"
      - "false"
    description: "For testing full AA1 configuration with 8-receptors"
  SPFRX_ENABLED:
    value: "false"
    options:
      - "true"
      - "false"
    description: "Deploy SPFRx if true"
  OSO_ENABLED:
    value: "false"
    options:
      - "true"
      - "false"
    description: "Deploy OSO if true"

stages:
  - lint
  - build
  - deploy
  - on_demand_psi
  - persistent_psi
  - test
  - log-collector
  - join-reports
  - pages
  - publish
  - scan
  - cleanup

include:
  # Python packages build, lint, test and publish
  # - project: 'ska-telescope/templates-repository'
  #   file: 'gitlab-ci/includes/python.gitlab-ci.yml'

  # Helm Charts
  - project: 'ska-telescope/templates-repository'
    file: 'gitlab-ci/includes/helm-chart.gitlab-ci.yml'

  # .post step finalisers eg: badges
  - project: 'ska-telescope/templates-repository'
    file: 'gitlab-ci/includes/finaliser.gitlab-ci.yml'

  # changelog release page
  - project: 'ska-telescope/templates-repository'
    file: 'gitlab-ci/includes/changelog.gitlab-ci.yml'

  # deploy steps to psi mid
  - local: "/.gitlab/ci/psi-mid.gitlab-ci.yml"
    
  - project: 'ska-telescope/templates-repository'
    file: 'gitlab-ci/includes/xray-publish.gitlab-ci.yml'

  # Docs pages
  - project: 'ska-telescope/templates-repository'
    file: 'gitlab-ci/includes/docs-pages.gitlab-ci.yml'

  # .post step finalisers eg: badges
  - project: 'ska-telescope/templates-repository'
    file: 'gitlab-ci/includes/finaliser.gitlab-ci.yml'

pages:
  rules:
    - when: never

python-test:
  image: $SKA_K8S_TOOLS_BUILD_DEPLOY
  extends:
    - .mid
  rules:
    - if: $CI_PIPELINE_SOURCE != "schedule"
      when: manual
  needs:
    - job: psi-mid-on-demand-deploy
  tags:
    - $RUNNER_TAG
  before_script:
    - mkdir -p build/reports
    - poetry config virtualenvs.create false
    - poetry install
  script:
    - make python-test KUBE_NAMESPACE=$KUBE_NAMESPACE
  artifacts:
    paths:
      - build/reports/cucumber.json
      - build/reports/report.json
      - build/reports/deployment_variables.txt
  allow_failure: true

log-collector:
  stage: log-collector
  when: manual
  extends:
    - .mid
  tags:
    - $RUNNER_TAG
  needs:
    - job: psi-mid-on-demand-deploy
  script:
    - mkdir -p logs
    - bash scripts/log-collector.sh "$KUBE_NAMESPACE" logs
  artifacts:
    name: "MID-PSI_${CI_COMMIT_BRANCH}${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}_Logs_${CI_JOB_STARTED_AT}"
    paths:
    - logs/*.log
  allow_failure: true

auto-log-collector: 
  stage: log-collector
  extends:
    - .mid
  tags:
    - $RUNNER_TAG
  needs:
    - job: python-test
  script:
    - mkdir -p logs
    - bash scripts/log-collector.sh "$KUBE_NAMESPACE" logs
  artifacts:
    paths:
    - logs/*.log
  allow_failure: true

xray-publish:
  extends:
    - .mid
  tags:
    - $RUNNER_TAG
  rules:
    - exists:
        - tests/xray-config.json
      when: on_success
  needs:
    - job: psi-mid-on-demand-deploy
      artifacts: true
    - job: python-test
    - job: auto-log-collector
  before_script:
    - echo "Loading deployment variables"
    - set -a
    - source build/reports/deployment_variables.txt
    - set +a
  script:
    - make xray-publish
