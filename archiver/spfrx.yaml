tango_hosts:
  - th1:
      host: "databaseds-tango-base.{{Release.Namespace}}.svc.cluster.local"
      port: "10000"
  - th2:
      host: "databaseds-tango-base.ska-tango-archiver.svc.cluster.local"
      port: "10000"

configuration_managers:
  - cm1:
      trl: mid-eda/cm/01
      th: th2
  - cm2:
      trl: mid-eda/cm/02
      th: th2

event_subscribers:
  - es1:
      trl: mid-eda/es/01
      th: th2
  - es2:
      trl: mid-eda/es/02
      th: th2

defaults:
  - th: th1
  - cm: cm1
  - es: es1

