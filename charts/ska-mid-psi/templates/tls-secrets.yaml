apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: ssl-cert-holder
  namespace: {{ .Release.Namespace }}
spec:
  type: kv-v2
  mount: psi-mid
  path: production/ssl-cert
  destination:
    name: ssl-cert
    create: true
    overwrite: true
    type: kubernetes.io/tls 