## tmc-mid
display: ":0"
xauthority: "~/.Xauthority"

global:
  dishids: &dish_ids ["SKA001"]
  dishes: ["001"]
tmc-mid:
  enabled: true
  subarray_count: 1
  global:
    namespace_dish:
      dish_names:
      - mid-dish/dish-manager/SKA001
  telescope: SKA-mid
  ska-tango-base:
    enabled: false
  deviceServers:
    centralnode:
      DishVccConfig:
        DishVccUri: "gitlab://gitlab.com/ska-telescope/ska-mid-psi?main#tmdata"
        DishVccFilePath: "instrument/ska1_mid_psi/aa05/ska-mid-cbf-system-parameters-itf.json"
      DishIDs:
      - SKA001
    mocks:
      enabled: false
      dish: false
      csp: false
      sdp: false
    dishleafnode:
      enabled: true
      instances:
      - '001'
    subarraynode:
      DishIDs:
      - SKA001
      CspScanInterfaceURL: "https://schema.skao.int/ska-csp-scan/2.2"
